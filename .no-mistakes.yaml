# Trusted pipeline commands for Observer Kit (used by the no-mistakes gate).
#
# The gate loads `commands` from the default branch, not the pushed branch, so
# these only take effect once merged to main — by design, a PR branch cannot
# inject arbitrary test/lint commands.
#
# `python3` is the interpreter no-mistakes shells out with; we pin PYTHONPATH=.
# so the repo's own observer_kit package is always the one under test, and the
# lint targets are the durable-boundary example workers (not the server/guard
# runtime, which legitimately fails the buffered-output heuristic).
#
# Trusted-local dashboard control POST: the observer_kit dashboard accepts
# control POSTs from same-origin (Origin/Referer matching Host) or non-browser
# clients (no Origin/Referer). This is preserved; do not weaken dry-run or the
# runguard source locks when touching the dashboard.
commands:
  test: "PYTHONPATH=. python3 -m observer_kit test"
  lint: "PYTHONPATH=. python3 -m observer_kit lint examples/example_worker.py && PYTHONPATH=. python3 -m observer_kit lint examples/observer-flow-demo/flow_coordinator.py && PYTHONPATH=. python3 -m observer_kit lint examples/observer-flow-demo/batch_flow_coordinator.py"
  verify: "PYTHONPATH=. python3 -m observer_kit test && PYTHONPATH=. python3 -m observer_kit lint examples/example_worker.py"
